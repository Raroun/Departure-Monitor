[platformio]
default_envs = lilygo-t5-47-s3

[env:lilygo-t5-47-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.partitions = default_8MB.csv

; Lilygo T5 4.7" S3 V2.4:
; - Flash: 8 MB QSPI
; - PSRAM: 8 MB OPI
board_build.arduino.memory_type = qio_opi

build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_SPIRAM_USE=1
    -DCONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=1
    ; USB-CDC seriellen Port beim Booten aktivieren (wichtig fuer S3 Boards)
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Aufloesung des ED047TC1 Panels (wird auch von der Library definiert)
    -DEPD_WIDTH=960
    -DEPD_HEIGHT=540

lib_deps = 
    bblanchon/ArduinoJson @ ^7.0.0
    ; LilyGo EPD47 Library fuer 4.7" E-Ink
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git

monitor_speed = 115200
upload_speed = 921600
